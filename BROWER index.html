<DOCTYPE html>
<html>
    <head>
        <title>Periodic table</title>
        <link rel="stylesheet" href="BROWER styles.css">
    </head>
    <body>
        <section id="stuff">
            <div id="Table">
                <canvas id = "table" width = "1000" height = "450"></canvas>
                <button id = "Hydrogen"></button>
            </div>
            <div id="Sheet">
                <canvas id = "chart" width = "400" height = "650"></canvas>
                <p id="name"> NAME: </p>
                <p id="number"> NUMBER: </p>
                <p id="symbol"> SYMBOL: </p>
                <p id="mass"> MASS: </p>
                <p id="boil"> BOIL: </p>
                <p id="melt"> MELT: </p>
                <p id="electrons"> ELECTRONS: </p>
                <p id="protons"> PROTONS: </p>
            </div>
        </section>
        <script src = "BROWER infoSheet.js"></script>
    </body>
</html>
