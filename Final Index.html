<DOCTYPE html>
<html>
    <head>
        <title>Periodic table</title>
        <link rel="stylesheet" href="Final Styles.css">
    </head>
    <body>
        <section id="stuff">
            <div id="Table">
                <canvas id = "table" width = "850" height = "450"></canvas>
            </div>
            <div id="Sheet">
                <canvas id = "chart" width = "400" height = "450"></canvas>
                <p id="name"> NAME: </p>
                <p id="number"> NUMBER: </p>
                <p id="symbol"> SYMBOL: </p>
                <p id="mass"> MASS: </p>
                <p id="boil"> BOIL: </p>
                <p id="melt"> MELT: </p>
                <p id="electrons"> ELECTRONS: </p>
                <p id="protons"> PROTONS: </p>
            </div>
            <div class="container" id="rep">
                <canvas id="rep_canvas" width="640" height="640"></canvas>
                <p id="info"> </p>
            </div>
        </section>
        <script src = "Final Table.js"></script>
        <script src="Final Atom Model.js"></script>
    </body>
</html>
